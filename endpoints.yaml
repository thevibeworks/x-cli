# REST v1.1 endpoints used for follow/unfollow, etc.
# Budgets here are mutation ceilings.
rest:
  verifyCredentials:
    path: /1.1/account/verify_credentials.json
    method: GET
    kind: read
  friendshipsCreate:
    path: /1.1/friendships/create.json
    method: POST
    kind: mutation
    min_gap: 8s
    max_gap: 22s
    daily_cap: 200
  friendshipsDestroy:
    path: /1.1/friendships/destroy.json
    method: POST
    kind: mutation
    min_gap: 8s
    max_gap: 22s
    daily_cap: 200
